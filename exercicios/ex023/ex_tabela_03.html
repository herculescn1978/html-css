<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 03 de tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: lightgray;
        }


    </style>
</head>

<body>

<table>

        </tr>

        <tr>
            <th scope="col">Nota 01</th>

    <tbody>

        </tr>

        <tr>

        </tr>

        <tr>

        </tr>

        <tr>

        </tr>

        <tr>
            <th colspan="4" scope="row">Média Exatas</th>
            <td>0.0</td>
        </tr>

        <tr>
            <th rowspan="2" scope="rowgroup">Humanas</th>
            <td>História</td>
            <td>0.0</td>
            <td>0.0</td>
            <td>0.0</td>
        </tr>

        <tr>
            <td>Geografica</td>
            <td>0.0</td>
            <td>0.0</td>
            <td>0.0</td>
        </tr>

        <tr>
            <th colspan="4" scope="row">Média de Humanas</th>
            <td>0.0</td>
        </tr>
        

    </tbody>

</table>


    
</body>
</html>
